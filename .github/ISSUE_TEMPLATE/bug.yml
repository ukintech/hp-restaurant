name: バグ報告
description: 不具合の報告
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているか
      placeholder: 例：モバイルでヘッダーメニューが閉じない
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順
      value: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どうなるべきか
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたか
  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: ブラウザ・OS等
      placeholder: "例: Chrome 120 / Windows 11"
